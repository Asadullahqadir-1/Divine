<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <!-- Deep navy to teal gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2B3E;stop-opacity:1" />
    </linearGradient>

    <!-- Crown emerald-to-teal gradient -->
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8E8D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1DB88A;stop-opacity:1" />
    </linearGradient>

    <!-- Blue accent gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A6FD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22B5F5;stop-opacity:1" />
    </linearGradient>

    <!-- Green line gradient -->
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DB88A;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#1DB88A;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#22B5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22B5F5;stop-opacity:0" />
    </linearGradient>

    <!-- Glow filter for crown -->
    <filter id="crownGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for icon -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circle clip -->
    <clipPath id="circleClip">
      <circle cx="100" cy="110" r="72"/>
    </clipPath>
  </defs>

  <!-- Background rectangle -->
  <rect width="600" height="220" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines background detail -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="44" x2="600" y2="44"/>
    <line x1="0" y1="88" x2="600" y2="88"/>
    <line x1="0" y1="132" x2="600" y2="132"/>
    <line x1="0" y1="176" x2="600" y2="176"/>
    <line x1="75" y1="0" x2="75" y2="220"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="225" y1="0" x2="225" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="375" y1="0" x2="375" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="525" y1="0" x2="525" y2="220"/>
  </g>

  <!-- ─── ICON CIRCLE ─── -->
  <!-- Outer ring -->
  <circle cx="100" cy="110" r="74" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner circle background -->
  <circle cx="100" cy="110" r="70" fill="#0F2540" opacity="0.9"/>

  <!-- Three-Peak Crown — clipped inside circle -->
  <g filter="url(#crownGlow)" clip-path="url(#circleClip)">
    <!-- Crown base band -->
    <rect x="58" y="128" width="84" height="14" rx="3" fill="url(#crownGrad)" opacity="0.95"/>

    <!-- Left peak -->
    <polygon points="65,128 74,90 83,128" fill="url(#crownGrad)" opacity="0.9"/>
    <!-- Center peak (tallest) -->
    <polygon points="88,128 100,72 112,128" fill="url(#crownGrad)" opacity="1"/>
    <!-- Right peak -->
    <polygon points="117,128 126,90 135,128" fill="url(#crownGrad)" opacity="0.9"/>

    <!-- Crown jewel dots -->
    <circle cx="74" cy="90" r="4.5" fill="#22B5F5" opacity="0.95"/>
    <circle cx="100" cy="72" r="5.5" fill="#FFFFFF" opacity="1"/>
    <circle cx="126" cy="90" r="4.5" fill="#22B5F5" opacity="0.95"/>
  </g>

  <!-- Tagline arc dots inside circle (decorative) -->
  <circle cx="68" cy="152" r="2" fill="#1DB88A" opacity="0.6"/>
  <circle cx="100" cy="158" r="2" fill="#1DB88A" opacity="0.6"/>
  <circle cx="132" cy="152" r="2" fill="#1DB88A" opacity="0.6"/>

  <!-- ─── TEXT BLOCK ─── -->
  <!-- "THE" small caps -->
  <text
    x="192" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="normal"
    letter-spacing="6"
    fill="#22B5F5"
    opacity="0.85"
  >T H E</text>

  <!-- "Leaders'" large bold -->
  <text
    x="188" y="134"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="bold"
    letter-spacing="1"
    fill="#FFFFFF"
  >Leaders'</text>

  <!-- Decorative divider line -->
  <rect x="192" y="143" width="355" height="2" rx="1" fill="url(#greenLine)"/>

  <!-- "MINDSET" spaced label -->
  <text
    x="192" y="168"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="normal"
    letter-spacing="9"
    fill="#1DB88A"
  >MINDSET</text>

  <!-- Tagline -->
  <text
    x="192" y="191"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-style="italic"
    letter-spacing="2"
    fill="#FFFFFF"
    opacity="0.45"
  >Purpose · Inclusion · Impact</text>

  <!-- Small decorative corner accent top-right -->
  <g opacity="0.2">
    <line x1="570" y1="18" x2="585" y2="18" stroke="#22B5F5" stroke-width="1.5"/>
    <line x1="585" y1="18" x2="585" y2="33" stroke="#22B5F5" stroke-width="1.5"/>
  </g>
  <g opacity="0.2">
    <line x1="15" y1="202" x2="30" y2="202" stroke="#1DB88A" stroke-width="1.5"/>
    <line x1="15" y1="187" x2="15" y2="202" stroke="#1DB88A" stroke-width="1.5"/>
  </g>
</svg>
